version: 2

updates:
  - package-ecosystem: "nuget"
    directories:
      - "/src/*"
      - "/src/Ui/*"
      - "/tests/*"
      - "/installer"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "08:00"
      timezone: "Europe/Istanbul"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "dotnet"
    commit-message:
      prefix: "deps"
      include: "scope"
    groups:
      dotnet-runtime:
        patterns:
          - "Microsoft.Extensions.*"
          - "System.*"
        update-types:
          - "minor"
          - "patch"
      test-tooling:
        patterns:
          - "xunit*"
          - "FluentAssertions"
          - "coverlet.*"
        update-types:
          - "minor"
          - "patch"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "08:30"
      timezone: "Europe/Istanbul"
    open-pull-requests-limit: 3
    labels:
      - "dependencies"
      - "github-actions"
    commit-message:
      prefix: "deps"
      include: "scope"

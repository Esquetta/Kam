name: Bug report
description: Report a reproducible Kam issue.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Include enough evidence for another maintainer to reproduce the issue without seeing your secrets.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What failed, and what did you expect instead?
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - AI runtime / model provider
        - Skill execution
        - Voice and audio
        - Desktop automation
        - Runtime Diagnostics
        - Plugins / skills UI
        - Packaging / smoke
        - Documentation
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Reproduction steps
      placeholder: |
        1. Open Settings > AI Runtime
        2. Select provider...
        3. Run command...
    validations:
      required: true
  - type: textarea
    id: evidence
    attributes:
      label: Evidence
      description: Paste sanitized logs, readiness report text, screenshots, or smoke summary paths.
    validations:
      required: false
  - type: checkboxes
    id: safety
    attributes:
      label: Safety check
      options:
        - label: I removed API keys, bearer tokens, passwords, and private endpoints from this report.
          required: true

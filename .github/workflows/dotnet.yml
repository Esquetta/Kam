name: .NET CI

on:
  push:
    branches: [ master, main, develop ]
  pull_request:
    branches: [ master, main ]

jobs:
  build:
    runs-on: windows-2025-vs2026

    steps:
    - uses: actions/checkout@v6
    
    - name: Setup .NET 9
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: '9.0.x'
    
    - name: Restore dependencies
      run: dotnet restore Kam.sln

    - name: Audit vulnerable NuGet packages
      run: dotnet list Kam.sln package --vulnerable --include-transitive
    
    - name: Build
      run: dotnet build Kam.sln --configuration Release --no-restore
    
    - name: Test
      run: dotnet test tests/SmartVoiceAgent.Tests/SmartVoiceAgent.Tests.csproj --configuration Release --no-build --verbosity normal
    
    - name: Local production smoke
      shell: pwsh
      run: ./scripts/local-production-smoke.ps1 -Configuration Release -Runtime win-x64 -SkipTests -SkipSkillSmoke -RequireAiConfig:$false -ReleaseCandidate "ci-${{ github.sha }}"
    
    - name: Upload build artifacts
      uses: actions/upload-artifact@v7
      with:
        name: kam-windows-release
        path: artifacts/local-production-smoke/**/publish/**
        retention-days: 7

    - name: Upload production smoke evidence
      uses: actions/upload-artifact@v7
      with:
        name: kam-production-smoke-evidence
        path: |
          artifacts/local-production-smoke/**/summary.md
          artifacts/local-production-smoke/**/skill-smoke.md
          artifacts/local-production-smoke/**/command-smoke.md
        retention-days: 14

  security-scan:
    runs-on: windows-2025-vs2026
    
    steps:
    - uses: actions/checkout@v6
    
    - name: Setup .NET for security tools
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: |
          9.0.x
          6.0.x
    
    - name: Restore dependencies
      run: dotnet restore Kam.sln

    - name: Audit vulnerable NuGet packages
      run: dotnet list Kam.sln package --vulnerable --include-transitive
    
    - name: Run security analysis
      shell: pwsh
      run: |
        $installSucceeded = $false

        try {
          dotnet tool update --global security-scan --version 5.6.7
          $installSucceeded = $LASTEXITCODE -eq 0
        } catch {
          $installSucceeded = $false
        }

        if (-not $installSucceeded) {
          Write-Warning "Optional security-scan tool install failed. Skipping security analysis."
          exit 0
        }

        $env:PATH = "$env:USERPROFILE\.dotnet\tools;$env:PATH"
        security-scan Kam.sln --excl-proj="**/SmartVoiceAgent.Tests.csproj"
